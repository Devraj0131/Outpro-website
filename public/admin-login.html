<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>admin-login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050b24;
        }

        .login-box {
            background: #0d1635;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        h2 {
            color: white;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2563eb;
        }

        #msg {
            color: red;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="login-box" >

        <h2>Admin login</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>

            <input type="password" id="password" placeholder="Password">

            <button type="submit"> submit</button>
        </form>

        <p id="msg"></p>

    </div>

    <script>
        const form = document.getElementById("loginForm");
        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const res = await fetch("/admin-login", {
                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    username: username.value,
                    password: password.value
                })

            });


            if (res.ok) {

                window.location.href = "/admin";

            } else {

                document.getElementById("msg").innerText =
                    "Invalid credentials";

            }

        });

    </script>

</body>

</html>
