<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outpro India | Contact</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="images/logo.png">

</head>

<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">
            Outpro
        </div>

        <ul class="nav-links">

            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/services">Services</a></li>
            <li><a href="/portfolio">Portfolio</a></li>
            <li><a href="/contact">Contact</a></li>

        </ul>

        <a href="/services" class="nav-button">Get Started</a>

    </header>


    <section class="hero" style="min-height: 40vh;">
        <h1>Contact Us</h1>
    </section>

    <section class="contact">

        <h2>Get in Touch</h2>

        <form class="contact-form" method="POST">

            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button>Send Message</button>

        </form>

        <div id="form-message"></div>
    </section>

    <footer class="footer">
        <p>© 2026 Outpro India. All rights reserved.</p>


        <div class="social-icons">
            <a href="https://www.instagram.com/outpro.india/" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>

            <a href="https://www.linkedin.com/company/outpro-india/?utm_source=ig&utm_medium=social&utm_content=link_in_bio&fbclid=PAZXh0bgNhZW0CMTEAc3J0YwZhcHBfaWQMMjU2MjgxMDQwNTU4AAGn4XhLylZdvIFngLXK37yfI-NuD2P_dv6RVGxDJ3SghRwlI5Q_hzsb5rV_tIc_aem_5kHgXNovDx876jo_LGO1pA"
                target="_blank">
                <i class="fab fa-linkedin"></i>
            </a>
        </div>

    </footer>


    <script src="js/script.js"></script>

</body>

</html>
